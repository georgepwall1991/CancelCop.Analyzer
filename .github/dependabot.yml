version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    groups:
      # Keep the Roslyn packages moving together to avoid mismatched versions.
      roslyn:
        patterns:
          - "Microsoft.CodeAnalysis.*"
      test:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
